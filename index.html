<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>personaOS</title>
<meta name="description" content="A retro desktop-style library for academic papers — read, rate, annotate. Single-file static site.">
<meta name="theme-color" content="#09080a">
<meta name="color-scheme" content="dark">
<meta property="og:type" content="website">
<meta property="og:title" content="personaOS">
<meta property="og:url" content="https://internetpersona.net">
<link rel="canonical" href="https://internetpersona.net/">
<meta property="og:description" content="A retro desktop-style library for academic papers — read, rate, annotate.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Paper Library — Persona OS">
<meta name="twitter:description" content="A retro desktop-style library for academic papers.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Pixelify+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="desktop">
  <div class="d-icon" id="icon-reviews" ondblclick="openReviews()" onclick="selectIcon('icon-reviews')">
    <div class="icon-img">📁</div>
    <div class="icon-label">Reviews</div>
  </div>
  <div class="d-icon" id="icon-about" ondblclick="openAbout()" onclick="selectIcon('icon-about')">
    <div class="icon-img">🪪</div>
    <div class="icon-label">About Me</div>
  </div>
  <div class="d-icon" id="icon-guestbook" ondblclick="openGuestbook()" onclick="selectIcon('icon-guestbook')">
    <div class="icon-img">📬</div>
    <div class="icon-label">Guestbook</div>
  </div>
  <div class="d-icon" id="icon-terminal" ondblclick="openTerminal()" onclick="selectIcon('icon-terminal')">
    <div class="icon-img">🖥️</div>
    <div class="icon-label">Terminal</div>
  </div>
  <div class="d-icon secret" id="icon-classified" ondblclick="openClassified()" onclick="selectIcon('icon-classified')">
    <div class="icon-img">🔓</div>
    <div class="icon-label">root</div>
  </div>
</div>

<div id="preview-card" class="preview-card">
  <div class="pc-title" id="pc-title"></div>
  <div class="pc-meta"  id="pc-meta"></div>
  <div class="pc-stars" id="pc-stars"></div>
</div>

<div id="taskbar">
  <button id="start-btn" onclick="toggleStartMenu()">⊞ PERSONA OS</button>
  <div class="task-sep"></div>
  <div id="taskbar-items"></div>
  <div id="tray"><span id="admin-badge" class="locked" onclick="toggleAdminLogin()" title="Admin login">GUEST</span><span id="clock">--:--</span></div>
</div>

<div id="start-menu">
  <div class="menu-strip">Persona OS</div>
  <div class="menu-items">
    <div class="menu-item" onclick="openReviews();closeStartMenu()">📁 Reviews</div>
    <div class="menu-item" onclick="openAbout();closeStartMenu()">🪪 About Me</div>
    <div class="menu-item" onclick="openGuestbook();closeStartMenu()">📬 Guestbook</div>
    <div class="menu-item" onclick="openAddPaper();closeStartMenu()">📄 Add Paper</div>
    <div class="menu-item" onclick="openPreferences();closeStartMenu()">⚙ Preferences</div>
  </div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" onclick="openReviews();closeCtx()">📁 Open Reviews</div>
  <div class="ctx-item" onclick="openAbout();closeCtx()">🪪 About Me</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-note-item" onclick="openStickyEditor();closeCtx()" style="display:none">📝 Edit Note</div>
  <div class="ctx-item" onclick="openPreferences();closeCtx()">⚙ Preferences</div>
</div>

<div id="toast"></div>
<div id="sticky-note" class="hidden"></div>

<!-- CRT vignette overlay -->
<div id="crt-vignette" style="position:fixed;inset:0;pointer-events:none;z-index:99998;opacity:0;transition:opacity .3s;background:radial-gradient(ellipse 68% 68% at 50% 50%, transparent 42%, rgba(0,0,0,0.97) 100%)"></div>

<!-- Matrix rain wallpaper — only drawn in hacker mode -->
<canvas id="matrix"></canvas>

<script src="app.js"></script>
</body>
</html>
