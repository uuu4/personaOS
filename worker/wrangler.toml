name = "personaos-publish"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Secrets are NOT defined here. Set them via:
#   npx wrangler secret put GITHUB_TOKEN
#   npx wrangler secret put ADMIN_PASSWORD

# Guestbook storage. Create the namespace once, then paste its id below:
#   npx wrangler kv namespace create GUESTBOOK
[[kv_namespaces]]
binding = "GUESTBOOK"
id = "913c2fd643704c2dae201af7a264d80b"

[observability]
enabled = true
